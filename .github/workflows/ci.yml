name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-build-id:
    name: Generate BUILD_ID
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.build_id.outputs.BUILD_ID }}
    steps:
      - name: Generate BUILD_ID
        id: build_id
        run: |
          BUILD_DATE=$(date -u +%Y.%m.%d)
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_ID="${BUILD_DATE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_OUTPUT"

  python-services-check:
    name: Check Python service (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: access
            test_target: src
          - service: activity
            test_target: src
          - service: bff
            test_target: src/bff/tests.py src/bff/tests_tenant_context.py
          - service: events
            test_target: src/events/tests.py src/events/test_settings_security.py
          - service: featureflags
            test_target: src/featureflags/tests.py
          - service: gamification
            test_target: src/gamification/tests.py src/gamification/test_settings_security.py
          - service: portal
            test_target: src/portal/tests.py
          - service: voting
            test_target: >-
              src/core/tests/test_production_components.py
              src/nominations/test_services_unit.py
              src/tenant_voting/test_services_unit.py
              src/tenant_voting/tests.py
              src/tenant_voting/test_integration.py
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      DJANGO_SETTINGS_MODULE: app.settings
      PYTHONPATH: src
      DJANGO_DEBUG: 'True'
      DJANGO_SECRET_KEY: ci-test-secret
      DJANGO_ALLOW_INSECURE_DEFAULTS: '1'
      ALLOWED_HOSTS: .updspace.com,.updating.space,.localhost,testserver,localhost,127.0.0.1,.yandexcloud.net,bff,access,portal,voting,events,gamification,activity,featureflags
      DATABASE_URL: sqlite:///db.sqlite3
      BFF_INTERNAL_HMAC_SECRET: ci-internal-hmac
      BFF_UPDSPACEID_CALLBACK_SECRET: ci-callback-secret
      ACTIVITY_DATA_ENCRYPTION_KEY: ci-activity-encryption-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install pytest pytest-django ruff
      - name: Run Ruff
        run: ruff check src
      - name: Run tests
        run: pytest -q ${{ matrix.test_target }}

  ydb-schema-check:
    name: YDB schema dry-run (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - access
          - activity
          - bff
          - events
          - featureflags
          - gamification
          - portal
          - voting
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      DJANGO_SETTINGS_MODULE: app.settings
      PYTHONPATH: src
      DJANGO_DEBUG: 'True'
      DJANGO_SECRET_KEY: ci-test-secret
      DJANGO_ALLOW_INSECURE_DEFAULTS: '1'
      ALLOWED_HOSTS: .updspace.com,.updating.space,.localhost,testserver,localhost,127.0.0.1,.yandexcloud.net,bff,access,portal,voting,events,gamification,activity,featureflags
      BFF_INTERNAL_HMAC_SECRET: ci-internal-hmac
      BFF_UPDSPACEID_CALLBACK_SECRET: ci-callback-secret
      ACTIVITY_DATA_ENCRYPTION_KEY: ci-activity-encryption-key
      DB_DRIVER: ydb
      YDB_ENDPOINT: grpc://localhost:2136
      YDB_DATABASE: /local
      YDB_NAME: default
      YDB_CREDENTIALS_MODE: token
      YDB_TOKEN: local-ydb-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Start YDB local
        run: |
          docker run -d --rm \
            --name ydb-local \
            --hostname 127.0.0.1 \
            -p 2136:2136 \
            -p 8765:8765 \
            ydbplatform/local-ydb:latest
          ../../scripts/ci/wait-for-ydb-local.sh
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
      - name: YDB local smoke
        run: docker exec ydb-local sh -lc 'ydb -e grpc://localhost:2136 -d /local scheme ls'
      - name: Run migrate_ydb dry-run
        run: python src/manage.py migrate_ydb --dry-run

  frontend-check:
    name: Check portal frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/portal-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build

  terraform-check:
    name: Check Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloud_id: dummy-cloud
      TF_VAR_folder_id: dummy-folder
      TF_VAR_id_public_base_url: https://id.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform/yandex-cloud
      - name: Terraform init
        run: terraform -chdir=infra/terraform/yandex-cloud init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform/yandex-cloud validate

  yc-hardening-audit:
    name: Audit YC hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run YC hardening audit
        run: bash ./scripts/ci/audit-yc-hardening.sh

  docker-build-validate:
    name: Build image (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs:
      - python-services-check
      - ydb-schema-check
      - frontend-check
      - terraform-check
      - yc-hardening-audit
      - generate-build-id
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: updatingspace-portal-access
            context: services/access
            dockerfile: services/access/Dockerfile
            build_args: ''
          - image: updatingspace-portal-activity
            context: services/activity
            dockerfile: services/activity/Dockerfile
            build_args: ''
          - image: updatingspace-portal-bff
            context: services/bff
            dockerfile: services/bff/Dockerfile
            build_args: ''
          - image: updatingspace-portal-events
            context: services/events
            dockerfile: services/events/Dockerfile
            build_args: ''
          - image: updatingspace-portal-featureflags
            context: services/featureflags
            dockerfile: services/featureflags/Dockerfile
            build_args: ''
          - image: updatingspace-portal-gamification
            context: services/gamification
            dockerfile: services/gamification/Dockerfile
            build_args: ''
          - image: updatingspace-portal-portal
            context: services/portal
            dockerfile: services/portal/Dockerfile
            build_args: ''
          - image: updatingspace-portal-voting
            context: services/voting
            dockerfile: services/voting/Dockerfile
            build_args: ''
          - image: updatingspace-portal-frontend
            context: .
            dockerfile: web/portal-frontend/Dockerfile
            build_args: |
              VITE_BUILD_ID=${{ needs.generate-build-id.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
