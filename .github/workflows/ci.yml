name: CI and Publish

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-build-id:
    name: Generate BUILD_ID
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.build_id.outputs.BUILD_ID }}
      short_sha: ${{ steps.build_id.outputs.SHORT_SHA }}
    steps:
      - name: Generate BUILD_ID
        id: build_id
        run: |
          BUILD_DATE=$(date -u +%Y.%m.%d)
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_ID="${BUILD_DATE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "BUILD_ID=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Build ID: ${BUILD_ID}"

  python-services-check:
    name: Check Python service (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: access
            test_target: src
          - service: activity
            test_target: src
          - service: bff
            test_target: src/bff/tests.py
          - service: events
            test_target: src/events/tests.py
          - service: gamification
            test_target: src/gamification/tests.py
          - service: portal
            test_target: src/portal/tests.py
          - service: voting
            test_target: >-
              src/core/tests/test_production_components.py
              src/nominations/test_services_unit.py
              src/tenant_voting/test_services_unit.py
              src/tenant_voting/tests.py
              src/tenant_voting/test_integration.py
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      DJANGO_SETTINGS_MODULE: app.settings
      PYTHONPATH: src
      DJANGO_DEBUG: '1'
      DJANGO_ALLOW_INSECURE_DEFAULTS: '1'
      DJANGO_ALLOW_SQLITE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install pytest pytest-django ruff
      - name: Run Ruff
        run: ruff check src
      - name: Run tests
        run: pytest -q ${{ matrix.test_target }}

  docker-build-validate:
    name: Build image (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs:
      - python-services-check
      - generate-build-id
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: updatingspace-portal-access
            context: services/access
            dockerfile: services/access/Dockerfile
            build_args: ''
          - image: updatingspace-portal-activity
            context: services/activity
            dockerfile: services/activity/Dockerfile
            build_args: ''
          - image: updatingspace-portal-bff
            context: services/bff
            dockerfile: services/bff/Dockerfile
            build_args: ''
          - image: updatingspace-portal-events
            context: services/events
            dockerfile: services/events/Dockerfile
            build_args: ''
          - image: updatingspace-portal-gamification
            context: services/gamification
            dockerfile: services/gamification/Dockerfile
            build_args: ''
          - image: updatingspace-portal-portal
            context: services/portal
            dockerfile: services/portal/Dockerfile
            build_args: ''
          - image: updatingspace-portal-voting
            context: services/voting
            dockerfile: services/voting/Dockerfile
            build_args: ''
          - image: updatingspace-portal-frontend
            context: web/portal-frontend
            dockerfile: web/portal-frontend/Dockerfile
            build_args: |
              VITE_BUILD_ID=${{ needs.generate-build-id.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  publish-images:
    name: Publish image (${{ matrix.image }})
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs:
      - docker-build-validate
      - generate-build-id
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: updatingspace-portal-access
            context: services/access
            dockerfile: services/access/Dockerfile
            build_args: ''
          - image: updatingspace-portal-activity
            context: services/activity
            dockerfile: services/activity/Dockerfile
            build_args: ''
          - image: updatingspace-portal-bff
            context: services/bff
            dockerfile: services/bff/Dockerfile
            build_args: ''
          - image: updatingspace-portal-events
            context: services/events
            dockerfile: services/events/Dockerfile
            build_args: ''
          - image: updatingspace-portal-gamification
            context: services/gamification
            dockerfile: services/gamification/Dockerfile
            build_args: ''
          - image: updatingspace-portal-portal
            context: services/portal
            dockerfile: services/portal/Dockerfile
            build_args: ''
          - image: updatingspace-portal-voting
            context: services/voting
            dockerfile: services/voting/Dockerfile
            build_args: ''
          - image: updatingspace-portal-frontend
            context: web/portal-frontend
            dockerfile: web/portal-frontend/Dockerfile
            build_args: |
              VITE_BUILD_ID=${{ needs.generate-build-id.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.generate-build-id.outputs.build_id }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  deploy-frontend-yandex-object-storage:
    name: Deploy frontend to Yandex Object Storage
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs:
      - generate-build-id
      - publish-images
    defaults:
      run:
        working-directory: web/portal-frontend
    env:
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
      YC_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
      YC_OBJECT_STORAGE_ENDPOINT: ${{ vars.YC_OBJECT_STORAGE_ENDPOINT || 'https://storage.yandexcloud.net' }}
      YC_API_GATEWAY_ID: ${{ secrets.YC_API_GATEWAY_ID }}
      YC_BFF_CONTAINER_ID: ${{ secrets.YC_BFF_CONTAINER_ID }}
      YC_API_GATEWAY_SERVICE_ACCOUNT_ID: ${{ secrets.YC_API_GATEWAY_SERVICE_ACCOUNT_ID }}
      YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Yandex Cloud frontend deploy secrets
        if: >-
          env.YC_BUCKET_NAME == '' ||
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID == '' ||
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY == ''
        run: |
          echo "Skipping frontend deploy: required Yandex Cloud secrets are not configured."
          exit 0
      - uses: actions/setup-node@v4
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != ''
        with:
          node-version: '22.12.0'
      - name: Enable corepack and install dependencies
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != ''
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          pnpm install --frozen-lockfile
      - name: Build frontend bundle
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != ''
        env:
          VITE_BUILD_ID: ${{ needs.generate-build-id.outputs.build_id }}
          VITE_BFF_BASE_URL: /api/v1
          VITE_API_BASE_URL: /api/v1
          VITE_LOGIN_PATH: /api/v1/auth/login
        run: pnpm run build:docker
      - name: Configure AWS CLI credentials (S3-compatible)
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != ''
        run: aws --version
      - name: Upload static bundle to Object Storage
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.YC_OBJECT_STORAGE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          FRONTEND_DIST_DIR: dist
        run: ../../scripts/ci/deploy-frontend-object-storage.sh
      - name: Install yc CLI
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != '' &&
          env.YC_API_GATEWAY_ID != '' &&
          env.YC_BFF_CONTAINER_ID != '' &&
          env.YC_API_GATEWAY_SERVICE_ACCOUNT_ID != '' &&
          env.YC_SA_KEY_JSON != ''
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh \
            | bash -s -- -i "${HOME}/yandex-cloud" -n
      - name: Update shared API Gateway spec
        if: >-
          env.YC_BUCKET_NAME != '' &&
          env.YC_OBJECT_STORAGE_ACCESS_KEY_ID != '' &&
          env.YC_OBJECT_STORAGE_SECRET_ACCESS_KEY != '' &&
          env.YC_API_GATEWAY_ID != '' &&
          env.YC_BFF_CONTAINER_ID != '' &&
          env.YC_API_GATEWAY_SERVICE_ACCOUNT_ID != '' &&
          env.YC_SA_KEY_JSON != ''
        run: |
          SA_KEY_FILE="${RUNNER_TEMP}/yc-sa-key.json"
          printf '%s' "${YC_SA_KEY_JSON}" > "${SA_KEY_FILE}"

          "${HOME}/yandex-cloud/bin/yc" config profile create ci || true
          "${HOME}/yandex-cloud/bin/yc" config profile activate ci
          "${HOME}/yandex-cloud/bin/yc" config set service-account-key "${SA_KEY_FILE}"

          if [ -n "${YC_CLOUD_ID}" ]; then
            "${HOME}/yandex-cloud/bin/yc" config set cloud-id "${YC_CLOUD_ID}"
          fi
          if [ -n "${YC_FOLDER_ID}" ]; then
            "${HOME}/yandex-cloud/bin/yc" config set folder-id "${YC_FOLDER_ID}"
          fi

          "${HOME}/yandex-cloud/bin/yc" serverless api-gateway update \
            --id "${YC_API_GATEWAY_ID}" \
            --spec ../../infra/yandex/api-gateway/portal-shared-gateway.openapi.yaml \
            --variables "frontend_bucket=${YC_BUCKET_NAME},bff_container_id=${YC_BFF_CONTAINER_ID},gateway_service_account_id=${YC_API_GATEWAY_SERVICE_ACCOUNT_ID}"
