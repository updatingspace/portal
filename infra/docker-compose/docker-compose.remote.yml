services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.insecure=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro


  db_access:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: access_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_access:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  db_portal:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: portal_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_portal:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  db_voting:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: voting_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_voting:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  db_events:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_events:/var/lib/postgresql/data
    ports:
      - "5438:5432"

  db_gamification:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gamification_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_gamification:/var/lib/postgresql/data
    ports:
      - "5440:5432"

  db_activity:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: activity_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_activity:/var/lib/postgresql/data
    ports:
      - "5439:5432"

  db_featureflags:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: featureflags_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_featureflags:/var/lib/postgresql/data
    ports:
      - "5441:5432"

  db_bff:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bff_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data_bff:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bff:
    build:
      context: ../../services/bff
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8080 --reload --workers 4 --worker-class gthread --threads 8 --timeout 120
    volumes:
      - ../../services/bff/src:/app/src
    ports:
      - "8080:8080"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=bff-secret
      - DATABASE_URL=postgres://user:pass@db_bff:5432/bff_db
      - REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=.localhost,localhost,127.0.0.1,bff
      # Upstreams
      - BFF_UPSTREAM_ID_URL=${BFF_UPSTREAM_ID_URL:-https://id.updspace.com/api/v1}
      - ID_BASE_URL=${ID_BASE_URL:-https://id.updspace.com/api/v1}
      - ACCESS_BASE_URL=http://access:8002/api/v1
      - BFF_UPSTREAM_PORTAL_URL=http://portal:8003/api/v1
      - BFF_UPSTREAM_VOTING_URL=http://voting:8004/api/v1
      - BFF_UPSTREAM_EVENTS_URL=http://events:8005/api/v1
      - BFF_UPSTREAM_FEED_URL=http://activity:8006/api/v1
      - BFF_UPSTREAM_GAMIFICATION_URL=http://gamification:8007/api/v1
      - BFF_UPSTREAM_FEATUREFLAGS_URL=http://featureflags:8008/api/v1
      # Increase proxy timeout to avoid 502 on slower upstreams (activity feed)
      - BFF_PROXY_TIMEOUT_SECONDS=30
      # Local domains
      - BFF_TENANT_HOST_SUFFIX=localhost
      - BFF_DEV_AUTO_TENANT=true
      # Internal trust
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
      - BFF_UPDSPACEID_CALLBACK_SECRET=${BFF_UPDSPACEID_CALLBACK_SECRET:?BFF_UPDSPACEID_CALLBACK_SECRET is required}
      # Public IdP base URL used for OIDC login redirects
      - ID_PUBLIC_BASE_URL=${ID_PUBLIC_BASE_URL:-https://id.updspace.com}
      # OIDC client credentials (must be provided via env for split-repo setup)
      - BFF_OIDC_CLIENT_ID=${BFF_OIDC_CLIENT_ID:?BFF_OIDC_CLIENT_ID is required}
      - BFF_OIDC_CLIENT_SECRET=${BFF_OIDC_CLIENT_SECRET:?BFF_OIDC_CLIENT_SECRET is required}
    depends_on:
      - db_bff
      - redis
      - access
      - portal
      - voting
      - events
      - gamification
      - activity
      - featureflags
    labels:
      - traefik.enable=true
      # Serve API from both api.<tenant>.localhost and <tenant>.localhost for same-origin dev
      - traefik.http.routers.bff.rule=(Host(`api.aef.localhost`) || Host(`aef.localhost`) || Host(`portal.localhost`)) && PathPrefix(`/api/v1`)
      - traefik.http.routers.bff.entrypoints=web
      - traefik.http.services.bff.loadbalancer.server.port=8080

  access:
    build:
      context: ../../services/access
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8002 --reload
    volumes:
      - ../../services/access/src:/app/src
    ports:
      - "8002:8002"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-access-secret
      - DATABASE_URL=postgres://user:pass@db_access:5432/access_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,access
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
    depends_on:
      - db_access

  portal:
    build:
      context: ../../services/portal
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8003 --reload
    volumes:
      - ../../services/portal/src:/app/src
    ports:
      - "8003:8003"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-portal-secret
      - DATABASE_URL=postgres://user:pass@db_portal:5432/portal_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,portal
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
    depends_on:
      - db_portal

  voting:
    build:
      context: ../../services/voting
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8004 --reload
    volumes:
      - ../../services/voting/src:/app/src
    ports:
      - "8004:8004"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-voting-secret
      - DATABASE_URL=postgres://user:pass@db_voting:5432/voting_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,voting
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
      - ACCESS_BASE_URL=http://access:8002/api/v1
    depends_on:
      - db_voting

  events:
    build:
      context: ../../services/events
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8005 --reload
    volumes:
      - ../../services/events/src:/app/src
    ports:
      - "8005:8005"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-events-secret
      - DATABASE_URL=postgres://user:pass@db_events:5432/events_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,events
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
      - ACCESS_BASE_URL=http://access:8002/api/v1
    depends_on:
      - db_events

  gamification:
    build:
      context: ../../services/gamification
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8007 --reload
    volumes:
      - ../../services/gamification/src:/app/src
    ports:
      - "8007:8007"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-gamification-secret
      - DATABASE_URL=postgres://user:pass@db_gamification:5432/gamification_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,gamification
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
      - ACCESS_BASE_URL=http://access:8002/api/v1
      - ACTIVITY_SERVICE_URL=http://activity:8006/api/v1
    depends_on:
      - db_gamification

  activity:
    build:
      context: ../../services/activity
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8006 --reload --workers 2 --worker-class gthread --threads 4 --timeout 120
    volumes:
      - ../../services/activity/src:/app/src
    ports:
      - "8006:8006"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-activity-secret
      - DATABASE_URL=postgres://user:pass@db_activity:5432/activity_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,activity
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
      - ACTIVITY_DATA_ENCRYPTION_KEY=${ACTIVITY_DATA_ENCRYPTION_KEY:-dev-activity-data-key}
    depends_on:
      - db_activity

  featureflags:
    build:
      context: ../../services/featureflags
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8008 --reload
    volumes:
      - ../../services/featureflags/src:/app/src
    ports:
      - "8008:8008"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-featureflags-secret
      - DATABASE_URL=postgres://user:pass@db_featureflags:5432/featureflags_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,featureflags
      - BFF_INTERNAL_HMAC_SECRET=dev-internal-hmac
    depends_on:
      - db_featureflags

  frontend:
    build:
      context: ../..
      dockerfile: web/portal-frontend/Dockerfile
      target: dev
    volumes:
      - ../../web/portal-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Browser calls /api/v1/* (same-origin with Vite); Vite proxies to BFF.
      - VITE_DEV_PROXY_TARGET=http://bff:8080
      # Back-compat: some code paths may still read these.
      - VITE_BFF_BASE_URL=/api/v1
      - VITE_API_BASE_URL=/api/v1
    depends_on:
      - bff
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-aef.rule=Host(`aef.localhost`)
      - traefik.http.routers.frontend-aef.entrypoints=web
      - traefik.http.routers.frontend-aef.service=frontend
      - traefik.http.routers.frontend-portal.rule=Host(`portal.localhost`)
      - traefik.http.routers.frontend-portal.entrypoints=web
      - traefik.http.routers.frontend-portal.service=frontend
      - traefik.http.services.frontend.loadbalancer.server.port=5173

volumes:
  pg_data_bff:
  pg_data_access:
  pg_data_portal:
  pg_data_voting:
  pg_data_events:
  pg_data_gamification:
  pg_data_activity:
  pg_data_featureflags:
